    <text x="100" y="498" class="body">Ranked 1st among ~300 students across two simultaneous programs</text>
    <text x="100" y="513" class="body">(Mathematics at University Of Antananarivo) — highest overall grade both semesters.</text>
    <text x="100" y="530" class="body">Recognized as Valedictorian with Distinction, December 2024.</text>
    <rect x="618" y="435" width="162" height="20" rx="10" class="pill-purple"/>
    <text x="699" y="448" text-anchor="middle" class="t-purple">With Distinction · Dec 2024</text>

