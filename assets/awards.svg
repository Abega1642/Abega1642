    <path d="M61 356 l3 3 l8-8" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="100" y="344" class="title">IYMC 2022 — International Youth Math Challenge</text>
    <text x="100" y="360" class="sub">Silver Honor Certificate</text>
    <text x="100" y="376" class="body">Recognized with Silver Honor in the international mathematics challenge.</text>
    <rect x="692" y="335" width="94" height="20" rx="10" class="pill-silver"/>
    <text x="739" y="348" text-anchor="middle" class="t-silver">Silver Honor</text>

