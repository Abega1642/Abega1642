<svg width="860" height="730" viewBox="0 0 860 730" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <defs>
        <style>
            .bg { fill: #0d1117; }
