    <rect x="32" y="556" width="4" height="112" rx="2" fill="#1d6fa4"/>
    <circle cx="68" cy="612" r="17" fill="#0d1f2d" stroke="#1d6fa4" stroke-width="1.25"/>
    <path d="M59 613 l3-4 l5 3 l6-7" stroke="#58a6ff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
