<svg width="860" height="580" viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .card { fill: #ffffff; stroke: #e8e8e8; stroke-width: 0.75; }
            .card-hover { fill: #f9f9f9; }
            .section-title { font-size: 13px; font-weight: 600; fill: #111111; letter-spacing: -0.2px; }
            .section-count { font-size: 11px; fill: #888888; }
            .cat-label { font-size: 9.5px; font-weight: 600; fill: #aaaaaa; letter-spacing: 0.07em; }
            .cert-name { font-size: 12.5px; font-weight: 600; fill: #111111; }
            .cert-issuer { font-size: 11px; fill: #888888; }
            .badge-text { font-size: 10px; font-weight: 600; }
            .divider { stroke: #eeeeee; stroke-width: 0.75; }

            .badge-honors { fill: #EEEDFE; }
            .badge-honors-text { fill: #3C3489; }
            .badge-verified { fill: #EAF3DE; }
            .badge-verified-text { fill: #27500A; }
            .badge-expert { fill: #E6F1FB; }
            .badge-expert-text { fill: #0C447C; }
            .badge-dist { fill: #FAECE7; }
            .badge-dist-text { fill: #993C1D; }

            .icon-bg-purple { fill: #EEEDFE; }
            .icon-bg-green { fill: #EAF3DE; }
            .icon-bg-teal { fill: #E1F5EE; }
            .icon-bg-blue { fill: #E6F1FB; }
            .icon-bg-red { fill: #FAECE7; }
            .icon-bg-dark { fill: #F1EFE8; }
            .icon-bg-orange { fill: #FAEEDA; }
        </style>
    </defs>

    <!-- Background -->
    <rect width="860" height="580" rx="12" class="bg" stroke="#e8e8e8" stroke-width="0.75"/>

    <!-- Header -->
    <text x="32" y="46" class="section-title" font-size="17">Certifications &amp; Distinctions</text>
    <rect x="252" y="32" width="80" height="18" rx="9" fill="#f3f3f3" stroke="#e8e8e8" stroke-width="0.5"/>
    <text x="292" y="44.5" text-anchor="middle" class="section-count">8 credentials</text>
    <line x1="32" y1="62" x2="828" y2="62" class="divider"/>

    <!-- ─── CATEGORY: Programming Languages ─── -->
    <text x="32" y="85" class="cat-label">PROGRAMMING LANGUAGES</text>

    <!-- Row 1 — CodinGame -->
    <rect x="32" y="94" width="390" height="64" rx="10" class="card"/>
    <!-- icon -->
    <rect x="46" y="108" width="34" height="34" rx="7" class="icon-bg-purple"/>
    <text x="63" y="130" text-anchor="middle" font-size="18" fill="#8A2BE2">&#60;/&#62;</text>
    <!-- text -->
    <text x="90" y="122" class="cert-name">Java Certification</text>
    <text x="90" y="137" class="cert-issuer">CodinGame</text>
    <!-- badge -->
    <rect x="310" y="113" width="98" height="18" rx="9" class="badge-honors"/>
    <text x="359" y="125" text-anchor="middle" class="badge-text badge-honors-text">With Honors</text>

    <!-- Row 1 — HackerRank -->
    <rect x="438" y="94" width="390" height="64" rx="10" class="card"/>
    <rect x="452" y="108" width="34" height="34" rx="7" class="icon-bg-green"/>
    <!-- HackerRank checkmark icon -->
    <path d="M465 124 l4 4 l7-8" stroke="#1E8449" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="469" cy="125" r="9" stroke="#00A44B" stroke-width="1.5" fill="none"/>
    <text x="496" y="122" class="cert-name">Java Skills Certificate</text>
    <text x="496" y="137" class="cert-issuer">HackerRank</text>
    <rect x="716" y="113" width="98" height="18" rx="9" class="badge-verified"/>
    <text x="765" y="125" text-anchor="middle" class="badge-text badge-verified-text">Verified</text>

    <!-- Row 2 — SoloLearn -->
    <rect x="32" y="167" width="390" height="64" rx="10" class="card"/>
    <rect x="46" y="181" width="34" height="34" rx="7" class="icon-bg-teal"/>
    <circle cx="63" cy="198" r="9" stroke="#1ABC9C" stroke-width="1.5" fill="none"/>
    <path d="M58 198 l3 3 l6-6" stroke="#1ABC9C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="90" y="195" class="cert-name">Java Intermediate</text>
    <text x="90" y="210" class="cert-issuer">SoloLearn</text>
    <rect x="310" y="186" width="98" height="18" rx="9" class="badge-verified"/>
    <text x="359" y="198" text-anchor="middle" class="badge-text badge-verified-text">Certified</text>

    <!-- Row 2 — StudySection -->
    <rect x="438" y="167" width="390" height="64" rx="10" class="card"/>
    <rect x="452" y="181" width="34" height="34" rx="7" class="icon-bg-red"/>
    <text x="469" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#CC3333">J</text>
    <text x="490" y="195" class="cert-name">Java Foundation</text>
    <text x="490" y="210" class="cert-issuer">StudySection · 83.33%</text>
    <rect x="706" y="186" width="108" height="18" rx="9" class="badge-dist"/>
    <text x="760" y="198" text-anchor="middle" class="badge-text badge-dist-text">Distinction</text>

    <!-- Row 3 — Codefinity C++ -->
    <rect x="32" y="240" width="390" height="64" rx="10" class="card"/>
    <rect x="46" y="254" width="34" height="34" rx="7" class="icon-bg-blue"/>
    <text x="63" y="277" text-anchor="middle" font-size="13" font-weight="700" fill="#00599C">C++</text>
    <text x="90" y="268" class="cert-name">C++ Object-Oriented Programming</text>
    <text x="90" y="283" class="cert-issuer">Codefinity</text>
    <rect x="310" y="259" width="98" height="18" rx="9" class="badge-verified"/>
    <text x="359" y="271" text-anchor="middle" class="badge-text badge-verified-text">Certified</text>

    <!-- ─── DIVIDER ─── -->
    <line x1="32" y1="318" x2="828" y2="318" class="divider"/>

    <!-- ─── CATEGORY: Data Science ─── -->
    <text x="32" y="338" class="cat-label">DATA SCIENCE &amp; MACHINE LEARNING</text>

    <!-- Kaggle Pandas -->
    <rect x="32" y="347" width="390" height="64" rx="10" class="card"/>
    <rect x="46" y="361" width="34" height="34" rx="7" class="icon-bg-blue"/>
    <!-- Chart bars icon -->
    <rect x="54" y="378" width="5" height="9" rx="1" fill="#1A9FD9"/>
    <rect x="61" y="372" width="5" height="15" rx="1" fill="#1A9FD9"/>
    <rect x="68" y="368" width="5" height="19" rx="1" fill="#1A9FD9"/>
    <text x="90" y="375" class="cert-name">Pandas Mastery</text>
    <text x="90" y="390" class="cert-issuer">Kaggle</text>
    <rect x="310" y="362" width="98" height="18" rx="9" class="badge-verified"/>
    <text x="359" y="374" text-anchor="middle" class="badge-text badge-verified-text">Certified</text>

    <!-- Kaggle ML -->
    <rect x="438" y="347" width="390" height="64" rx="10" class="card"/>
    <rect x="452" y="361" width="34" height="34" rx="7" class="icon-bg-blue"/>
    <!-- ML network icon -->
    <circle cx="462" cy="370" r="3" fill="#1A9FD9"/>
    <circle cx="476" cy="370" r="3" fill="#1A9FD9"/>
    <circle cx="469" cy="383" r="3" fill="#1A9FD9"/>
    <line x1="462" y1="370" x2="469" y2="383" stroke="#1A9FD9" stroke-width="1"/>
    <line x1="476" y1="370" x2="469" y2="383" stroke="#1A9FD9" stroke-width="1"/>
    <line x1="462" y1="370" x2="476" y2="370" stroke="#1A9FD9" stroke-width="1"/>
    <text x="496" y="375" class="cert-name">Intermediate Machine Learning</text>
    <text x="496" y="390" class="cert-issuer">Kaggle</text>
    <rect x="716" y="362" width="98" height="18" rx="9" class="badge-verified"/>
    <text x="765" y="374" text-anchor="middle" class="badge-text badge-verified-text">Certified</text>

    <!-- ─── DIVIDER ─── -->
    <line x1="32" y1="424" x2="828" y2="424" class="divider"/>

    <!-- ─── CATEGORY: Infrastructure ─── -->
    <text x="32" y="444" class="cat-label">INFRASTRUCTURE &amp; DEVOPS</text>

    <!-- Docker Expert -->
    <rect x="32" y="453" width="796" height="64" rx="10" class="card"/>
    <rect x="46" y="467" width="34" height="34" rx="7" class="icon-bg-blue"/>
    <!-- Docker whale simplified -->
    <rect x="52" y="476" width="22" height="6" rx="2" fill="#2496ED"/>
    <rect x="55" y="471" width="6" height="6" rx="1" fill="#2496ED"/>
    <rect x="63" y="471" width="6" height="6" rx="1" fill="#2496ED"/>
    <text x="90" y="481" class="cert-name">Docker Expert</text>
    <text x="90" y="496" class="cert-issuer">CodeSignal · 3 consecutive assessments</text>
    <rect x="714" y="468" width="100" height="18" rx="9" class="badge-expert"/>
    <text x="764" y="480" text-anchor="middle" class="badge-text badge-expert-text">Expert × 3</text>

    <!-- Footer -->
    <line x1="32" y1="533" x2="828" y2="533" class="divider"/>
    <text x="32" y="556" font-size="10.5" fill="#bbbbbb">All credentials are linked and verifiable. Click any card to access the certificate.</text>
</svg>