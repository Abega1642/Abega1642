<svg width="860" height="340" viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <defs>
        <style>
            .bg           { fill: #0d1117; }
            .divider      { stroke: #21262d; stroke-width: 0.75; }
            .sec-title    { font-size: 17px; font-weight: 700; fill: #f0f6fc; letter-spacing: -0.3px; }
            .card         { fill: #161b22; stroke: #30363d; stroke-width: 0.75; }
            .card-feat    { fill: #161b22; stroke: #d29922; stroke-width: 1.25; }
            .q-mark       { font-size: 32px; font-weight: 700; fill: #d29922; opacity: 0.45; }
            .q-text       { font-size: 13px; font-style: italic; fill: #c9d1d9; }
            .q-author     { font-size: 11px; fill: #8b949e; }
            .footer-text  { font-size: 10.5px; fill: #484f58; font-style: italic; }
            .accent-bar   { fill: #d29922; opacity: 0.7; }
        </style>
    </defs>

    <!-- Background -->
    <rect width="860" height="340" rx="14" class="bg"/>
    <!-- Top amber rule -->
    <rect x="0" y="0" width="860" height="3" rx="14" class="accent-bar"/>

    <!-- Header -->
    <text x="32" y="48" class="sec-title">Philosophy &amp; Inspiration</text>
    <line x1="32" y1="64" x2="828" y2="64" class="divider"/>

    <!-- Quote 1 — Hilbert (featured, left column) -->
    <rect x="32" y="78" width="398" height="80" rx="10" class="card-feat"/>
    <rect x="32" y="78" width="3" height="80" rx="2" fill="#d29922"/>
    <text x="52" y="110" class="q-mark">"</text>
    <text x="78" y="107" class="q-text">Wir müssen wissen.</text>
    <text x="78" y="123" class="q-text">Wir werden wissen.</text>
    <text x="78" y="143" class="q-author">— David Hilbert</text>

    <!-- Quote 2 — Kaku (featured, right column) -->
    <rect x="446" y="78" width="382" height="80" rx="10" class="card-feat"/>
    <rect x="446" y="78" width="3" height="80" rx="2" fill="#d29922"/>
    <text x="466" y="110" class="q-mark">"</text>
    <text x="492" y="113" class="q-text">God is a mathematician.</text>
    <text x="492" y="143" class="q-author">— Michio Kaku</text>

    <!-- Quote 3 — Nothing big (left) -->
    <rect x="32" y="172" width="398" height="64" rx="10" class="card"/>
    <text x="52" y="200" class="q-mark">"</text>
    <text x="78" y="207" class="q-text">Nothing big is done without pain.</text>

    <!-- Quote 4 — Create yourself (right) -->
    <rect x="446" y="172" width="382" height="64" rx="10" class="card"/>
    <text x="466" y="200" class="q-mark">"</text>
    <text x="492" y="207" class="q-text">Create yourself.</text>

    <!-- Footer -->
    <line x1="32" y1="256" x2="828" y2="256" class="divider"/>
    <text x="430" y="280" text-anchor="middle" class="footer-text">From abstract mathematics to concrete code — building the future one algorithm at a time.</text>
</svg>